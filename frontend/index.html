<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Candidate Ranker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3149;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo { font-size: 22px; font-weight: 700; color: #fff; }
  .logo span { color: #6366f1; }
  .tagline { font-size: 13px; color: #64748b; margin-left: auto; }

  /* ── Layout ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 10px;
    padding: 20px;
  }
  .card h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 12px;
    font-size: 13px;
    resize: vertical;
    font-family: inherit;
    line-height: 1.6;
  }
  textarea:focus { outline: none; border-color: #6366f1; }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

  button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: #6366f1; color: #fff; }
  .btn-secondary { background: #2d3149; color: #e2e8f0; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ── Status ── */
  .status-bar {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .status-bar.show { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid #2d3149;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results ── */
  #results { display: none; }
  .results-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .results-header h2 { font-size: 18px; font-weight: 700; }
  .results-meta { font-size: 13px; color: #64748b; }

  .rationale-box {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-left: 3px solid #6366f1;
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: #94a3b8;
    margin-bottom: 20px;
  }

  /* ── Candidate cards ── */
  .candidate-card {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .candidate-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
  }
  .candidate-header:hover { background: #20243a; }

  .rank-badge {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .rank-1 { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
  .rank-2 { background: #94a3b822; color: #94a3b8; border: 1px solid #94a3b844; }
  .rank-3 { background: #cd7c5422; color: #cd7c54; border: 1px solid #cd7c5444; }
  .rank-n { background: #2d314922; color: #64748b; border: 1px solid #2d3149; }

  .cand-name { font-weight: 600; font-size: 15px; }
  .cand-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

  .score-pill {
    margin-left: auto;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .verdict-strong { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
  .verdict-moderate { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
  .verdict-weak { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
  .verdict-poor { background: #6b728022; color: #6b7280; border: 1px solid #6b728044; }
  .verdict-error { background: #7c3aed22; color: #7c3aed; border: 1px solid #7c3aed44; }

  .chevron { color: #64748b; transition: transform 0.2s; font-size: 12px; }
  .chevron.open { transform: rotate(180deg); }

  .candidate-body { display: none; padding: 0 20px 20px; border-top: 1px solid #2d3149; }
  .candidate-body.open { display: block; }

  /* Score breakdown */
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin: 16px 0;
  }
  .score-dim {
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 8px;
    padding: 12px;
  }
  .dim-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
  .dim-weight { font-size: 10px; color: #4b5563; float: right; }
  .dim-score { font-size: 22px; font-weight: 700; margin: 6px 0 4px; }
  .dim-bar { height: 3px; background: #2d3149; border-radius: 2px; overflow: hidden; }
  .dim-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .dim-rationale { font-size: 12px; color: #64748b; margin-top: 8px; line-height: 1.5; }

  /* Summary */
  .section-label {
    font-size: 11px; color: #64748b; text-transform: uppercase;
    letter-spacing: 0.06em; margin: 16px 0 8px;
  }
  .recruiter-summary {
    font-size: 13px; color: #94a3b8; line-height: 1.7;
    background: #0f1117; border: 1px solid #2d3149;
    border-radius: 8px; padding: 12px;
  }

  .flags-row { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
  .flags-col { flex: 1; min-width: 180px; }
  .flag-item {
    font-size: 12px; padding: 4px 0;
    display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
  }
  .flag-dot { flex-shrink: 0; margin-top: 5px; width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: #22c55e; }
  .dot-red { background: #ef4444; }

  /* Error state */
  .error-box {
    background: #ef444411;
    border: 1px solid #ef444433;
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 20px;
    display: none;
  }
  .error-box.show { display: block; }

  /* Export */
  .export-row { display: flex; gap: 10px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="logo">AI<span>Ranker</span></div>
  <div class="tagline">Ranks candidates the way a great recruiter would</div>
</header>

<div class="container">

  <!-- Input Section -->
  <div class="grid">
    <div class="card">
      <h3>Job Description</h3>
      <textarea id="jdInput" rows="14" placeholder="Paste the full job description here..."></textarea>
      <div class="btn-row">
        <button class="btn-secondary btn-sm" onclick="loadSampleJD()">Load Sample JD</button>
      </div>
    </div>
    <div class="card">
      <h3>Candidate Profiles (JSON Array)</h3>
      <textarea id="candidatesInput" rows="14" placeholder='[
  { "candidate_id": "CAND_001", "profile": { ... }, ... },
  { "candidate_id": "CAND_002", ... }
]'></textarea>
      <div class="btn-row">
        <button class="btn-secondary btn-sm" onclick="loadSampleCandidates()">Load Sample Candidates</button>
      </div>
    </div>
  </div>

  <div class="btn-row" style="margin-bottom: 24px;">
    <button class="btn-primary" id="rankBtn" onclick="runRanking()">🚀 Rank Candidates</button>
    <button class="btn-secondary" onclick="clearAll()">Clear</button>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Parsing job description...</span>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">
    <div class="results-header">
      <h2 id="resultTitle">Ranked Candidates</h2>
      <span class="results-meta" id="resultMeta"></span>
      <div class="export-row" style="margin-left: auto;">
        <button class="btn-secondary btn-sm" onclick="exportJSON()">Export JSON</button>
        <button class="btn-secondary btn-sm" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>

    <div class="rationale-box" id="rankingRationale"></div>

    <div id="candidateList"></div>
  </div>

</div>

<script>
const API_BASE = window.location.origin;
let lastResult = null;

// ── Sample data loaders ────────────────────────────────────────────

You'll own the feature pipeline, model serving layer, and MLOps tooling that powers our core product.

}

// ── Main ranking call ──────────────────────────────────────────────
async function runRanking() {
  const jd = document.getElementById('jdInput').value.trim();
  const candidatesRaw = document.getElementById('candidatesInput').value.trim();

  if (!jd) { showError('Please enter a job description.'); return; }
  if (!candidatesRaw) { showError('Please enter candidate profiles as a JSON array.'); return; }

  let candidates;
  try {
    candidates = JSON.parse(candidatesRaw);
    if (!Array.isArray(candidates)) throw new Error('Must be a JSON array');
  } catch(e) {
    showError('Invalid JSON in candidates field: ' + e.message);
    return;
  }

  hideError();
  setStatus(true, `Parsing JD and scoring ${candidates.length} candidate(s)...`);
  document.getElementById('rankBtn').disabled = true;
  document.getElementById('results').style.display = 'none';

  try {
    const steps = ['Parsing job requirements...', 'Scoring candidates with AI...', 'Analyzing behavioral signals...', 'Building final ranking...'];
    let stepIdx = 0;
    const stepInterval = setInterval(() => {
      stepIdx = (stepIdx + 1) % steps.length;
      setStatus(true, steps[stepIdx]);
    }, 3000);

    const res = await fetch(`${API_BASE}/rank`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({job_description: jd, candidates})
    });

    clearInterval(stepInterval);

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Server error');
    }

    const data = await res.json();
    lastResult = data;
    renderResults(data);
  } catch(e) {
    showError('Error: ' + e.message);
  } finally {
    setStatus(false);
    document.getElementById('rankBtn').disabled = false;
  }
}

// ── Render ─────────────────────────────────────────────────────────
function renderResults(data) {
  document.getElementById('resultTitle').textContent =
    `Ranked: ${data.job_title_inferred}`;
  document.getElementById('resultMeta').textContent =
    `${data.total_candidates} candidate${data.total_candidates !== 1 ? 's' : ''} evaluated`;
  document.getElementById('rankingRationale').textContent = data.ranking_rationale;

  const list = document.getElementById('candidateList');
  list.innerHTML = '';

  data.shortlist.forEach((c, idx) => {
    list.appendChild(buildCandidateCard(c, idx));
  });

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior: 'smooth', block: 'start'});
}

function buildCandidateCard(c, idx) {
  const verdictClass = {
    'Strong Fit': 'verdict-strong',
    'Moderate Fit': 'verdict-moderate',
    'Weak Fit': 'verdict-weak',
    'Poor Fit': 'verdict-poor',
  }[c.verdict] || 'verdict-error';

  const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : 'rank-n';

  const card = document.createElement('div');
  card.className = 'candidate-card';

  const dims = c.dimensions || {};
  const dimOrder = ['skill_match', 'experience_relevance', 'career_trajectory', 'behavioral_signals', 'logistics'];
  const dimLabels = {
    skill_match: 'Skill Match',
    experience_relevance: 'Experience',
    career_trajectory: 'Trajectory',
    behavioral_signals: 'Engagement',
    logistics: 'Logistics'
  };

  const scoreColor = (s) => {
    if (s >= 75) return '#22c55e';
    if (s >= 55) return '#f59e0b';
    if (s >= 35) return '#ef4444';
    return '#6b7280';
  };

  const dimsHTML = dimOrder.map(key => {
    const d = dims[key];
    if (!d) return '';
    const col = scoreColor(d.score);
    return `
      <div class="score-dim">
        <div class="dim-label">${dimLabels[key]} <span class="dim-weight">${d.weight || ''}</span></div>
        <div class="dim-score" style="color:${col}">${d.score}</div>
        <div class="dim-bar"><div class="dim-bar-fill" style="width:${d.score}%;background:${col}"></div></div>
        <div class="dim-rationale">${d.rationale || ''}</div>
      </div>`;
  }).join('');

  const greenHTML = (c.green_flags || []).slice(0, 5).map(f =>
    `<div class="flag-item"><div class="flag-dot dot-green"></div><span style="color:#86efac">${f}</span></div>`
  ).join('');

  const redHTML = (c.red_flags || []).slice(0, 5).map(f =>
    `<div class="flag-item"><div class="flag-dot dot-red"></div><span style="color:#fca5a5">${f}</span></div>`
  ).join('');

  card.innerHTML = `
    <div class="candidate-header" onclick="toggleCard(this)">
      <div class="rank-badge ${rankClass}">#${c.rank}</div>
      <div>
        <div class="cand-name">${c.name}</div>
        <div class="cand-sub">${c.candidate_id}</div>
      </div>
      <div class="score-pill ${verdictClass}">${c.total_score} · ${c.verdict}</div>
      <span class="chevron">▼</span>
    </div>
    <div class="candidate-body">
      <div class="section-label">Score Breakdown</div>
      <div class="score-grid">${dimsHTML}</div>

      <div class="section-label">Recruiter Summary</div>
      <div class="recruiter-summary">${c.recruiter_summary}</div>

      <div class="section-label">Signals</div>
      <div class="flags-row">
        <div class="flags-col">${greenHTML || '<div class="flag-item" style="color:#4b5563">None identified</div>'}</div>
        <div class="flags-col">${redHTML || '<div class="flag-item" style="color:#4b5563">None identified</div>'}</div>
      </div>
    </div>`;
  return card;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

// ── Export ─────────────────────────────────────────────────────────
function exportJSON() {
  if (!lastResult) return;
  const blob = new Blob([JSON.stringify(lastResult, null, 2)], {type: 'application/json'});
  download(blob, 'ranked_candidates.json');
}

function exportCSV() {
  if (!lastResult) return;
  const rows = [['rank','candidate_id','name','total_score','verdict','skill_match','experience','trajectory','engagement','logistics','recruiter_summary']];
  lastResult.shortlist.forEach(c => {
    const d = c.dimensions || {};
    rows.push([
      c.rank, c.candidate_id, c.name, c.total_score, c.verdict,
      d.skill_match?.score ?? '', d.experience_relevance?.score ?? '',
      d.career_trajectory?.score ?? '', d.behavioral_signals?.score ?? '',
      d.logistics?.score ?? '',
      `"${(c.recruiter_summary || '').replace(/"/g, "''")}"`
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  download(new Blob([csv], {type: 'text/csv'}), 'ranked_candidates.csv');
}

function download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ── Utilities ──────────────────────────────────────────────────────
function setStatus(show, msg = '') {
  const bar = document.getElementById('statusBar');
  bar.classList.toggle('show', show);
  if (msg) document.getElementById('statusText').textContent = msg;
}
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}
function clearAll() {
  document.getElementById('jdInput').value = '';
  document.getElementById('candidatesInput').value = '';
  document.getElementById('results').style.display = 'none';
  hideError();
  lastResult = null;
}
</script>
